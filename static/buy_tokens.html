<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Buy Tokens - ARIS</title>
<script src="https://cdn.tailwindcss.com"></script>

<style>
body {
    background: radial-gradient(circle at top, #08111f 0%, #000000 70%);
    color: white;
    font-family: Arial, sans-serif;
}

.plan-card {
    background: rgba(10, 20, 40, 0.95);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 24px;
    transition: all 0.3s ease;
}

.plan-card:hover {
    transform: translateY(-6px);
    box-shadow: 0 0 25px rgba(255, 140, 50, 0.25);
    border-color: rgba(255, 140, 50, 0.6);
}

.buy-btn {
    background: linear-gradient(90deg, #ff8c32, #ffb347);
    color: #000;
    font-weight: bold;
    border-radius: 14px;
    padding: 14px;
    width: 100%;
}
</style>
</head>
<body>

<div class="max-w-7xl mx-auto px-6 py-12">

    <h1 class="text-5xl font-bold text-center mb-4">
        Buy Premium Tokens
    </h1>

    <p class="text-center text-gray-300 text-xl mb-12">
        Available exclusively for active ARIS subscribers.
    </p>

    <div class="grid md:grid-cols-5 gap-6">

        <div class="plan-card p-6">
            <h2 class="text-2xl font-bold mb-2">Starter</h2>
            <p class="text-4xl font-bold mb-2">₹49</p>
            <p class="text-green-400 mb-6">10 Tokens</p>
            <button class="buy-btn">Buy Now</button>
        </div>

        <div class="plan-card p-6">
            <h2 class="text-2xl font-bold mb-2">Basic</h2>
            <p class="text-4xl font-bold mb-2">₹99</p>
            <p class="text-green-400 mb-6">25 Tokens</p>
            <button class="buy-btn">Buy Now</button>
        </div>

        <div class="plan-card p-6">
            <h2 class="text-2xl font-bold mb-2">Standard</h2>
            <p class="text-4xl font-bold mb-2">₹199</p>
            <p class="text-green-400 mb-6">60 Tokens</p>
            <button class="buy-btn">Buy Now</button>
        </div>

        <div class="plan-card p-6">
            <h2 class="text-2xl font-bold mb-2">Power</h2>
            <p class="text-4xl font-bold mb-2">₹399</p>
            <p class="text-green-400 mb-6">140 Tokens</p>
            <button class="buy-btn">Buy Now</button>
        </div>

        <div class="plan-card p-6">
            <h2 class="text-2xl font-bold mb-2">Creator</h2>
            <p class="text-4xl font-bold mb-2">₹699</p>
            <p class="text-green-400 mb-6">300 Tokens</p>
            <button class="buy-btn">Buy Now</button>
        </div>

    </div>

</div>

</body>
</html>
